services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - db
  db:
    image: mysql:8.0
    command: >
      sh -c "sed 's/NO_AUTO_CREATE_USER//g' /docker-entrypoint-initdb.d/init.sql > /docker-entrypoint-initdb.d/00_fixed.sql
      && exec /usr/local/bin/docker-entrypoint.sh mysqld"
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: distro_multi_search
      MYSQL_USER: admin
      MYSQL_PASSWORD: 12345678
    volumes:
      - db_data:/var/lib/mysql
      - ./src/main_db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "3307:3306"
volumes:
  db_data: